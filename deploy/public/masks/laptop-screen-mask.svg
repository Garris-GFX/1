<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2320 1520" preserveAspectRatio="xMidYMid slice">
  <!-- Embedded laptop.png as base64; mask created by turning dark screen pixels into white -->
  <defs>
    <filter id="lumaThreshold">
      <feColorMatrix type="matrix" values="0.2126 0.7152 0.0722 0 0  0.2126 0.7152 0.0722 0 0  0.2126 0.7152 0.0722 0 0  0 0 0 1 0"/>
      <feComponentTransfer>
        <!-- invert luminance so dark areas become opaque in mask -->
        <feFuncA type="table" tableValues="1 0" />
      </feComponentTransfer>
    </filter>

    <mask id="screenMask" maskUnits="userSpaceOnUse" x="0" y="0" width="2320" height="1520">
      <rect width="2320" height="1520" fill="#000" />
      <image href="data:image/png;base64," x="0" y="0" width="2320" height="1520" filter="url(#lumaThreshold)" preserveAspectRatio="xMidYMid slice" />
    </mask>
  </defs>

  <rect width="2320" height="1520" fill="#ffffff" mask="url(#screenMask)" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <!-- simple rectangular mask for laptop screen; adjust x/y/width/height/rx as needed -->
  <rect width="1200" height="700" fill="#000" />
  <rect x="200" y="140" width="800" height="420" rx="20" fill="#fff" />
</svg>